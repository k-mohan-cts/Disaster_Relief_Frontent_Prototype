<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relief Inventory - DisasterRelief</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="navigation.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        sidebar: '#1a365d',
                        sidebarHover: '#2a4a75',
                        brandBlue: '#1a4b6e',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
        }
        
        /* Custom Scrollbar for Sidebar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            background-color: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        /* Sidebar active state indicator */
        .sidebar-active {
            background-color: rgba(255,255,255,0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .sidebar-active i, .sidebar-active span {
            color: white !important;
            font-weight: 600;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <!-- Navigation will be injected here dynamically -->
    <script src="navigation.js"></script>

    <main class="flex-1 flex flex-col h-full overflow-hidden bg-white">
        
        <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-8 shrink-0">
            <h1 class="text-xl font-bold text-slate-800">Relief Operations</h1>
            
            <div class="flex items-center space-x-6">
                <button class="relative text-gray-500 hover:text-gray-700">
                    <i class="fa-regular fa-bell text-xl"></i>
                    <span class="absolute top-0 right-0 block h-2 w-2 rounded-full bg-red-500 ring-2 ring-white"></span>
                </button>
                
                <div class="h-6 w-px bg-gray-300"></div>
                
                <span class="px-3 py-1 bg-white border border-blue-200 text-blue-600 rounded-md text-sm font-medium shadow-sm">
                    Compliance
                </span>
                
                <button class="flex items-center text-gray-600 hover:text-gray-800 text-sm font-medium">
                    <i class="fa-solid fa-arrow-right-from-bracket mr-2"></i>
                    Sign out
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 bg-gray-50/50">
            
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-slate-800 mb-1">Relief Inventory</h2>
                <p class="text-gray-500 text-sm">Manage relief items available for distribution.</p>
            </div>

            <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="border-b border-gray-200 bg-white">
                            <tr>
                                <th class="px-6 py-5 text-sm font-bold text-slate-800">Item Name</th>
                                <th class="px-6 py-5 text-sm font-bold text-slate-800">Type</th>
                                <th class="px-6 py-5 text-sm font-bold text-slate-800">Quantity</th>
                                <th class="px-6 py-5 text-sm font-bold text-slate-800">Status</th>
                            </tr>
                        </thead>
                        
                        <tbody class="divide-y divide-gray-100 text-sm text-gray-600">
                            
                            <tr class="hover:bg-gray-50/80 transition-colors">
                                <td class="px-6 py-4 flex items-center">
                                    <div class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center mr-4 shrink-0 text-gray-500 border border-gray-200/50">
                                        <i class="fa-solid fa-cube text-sm"></i>
                                    </div>
                                    <span class="font-bold text-slate-800">MRE Rations</span>
                                </td>
                                <td class="px-6 py-4 text-slate-700">Food</td>
                                <td class="px-6 py-4">
                                    <span class="font-bold text-slate-800">5,000</span> <span class="text-gray-500">Meals</span>
                                </td>
                                <td class="px-6 py-4">
                                    <span class="px-3.5 py-1.5 bg-emerald-100/80 text-emerald-700 rounded-full text-[11px] font-bold tracking-wide">Available</span>
                                </td>
                            </tr>

                            <tr class="hover:bg-gray-50/80 transition-colors">
                                <td class="px-6 py-4 flex items-center">
                                    <div class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center mr-4 shrink-0 text-gray-500 border border-gray-200/50">
                                        <i class="fa-solid fa-cube text-sm"></i>
                                    </div>
                                    <span class="font-bold text-slate-800">Bottled Water</span>
                                </td>
                                <td class="px-6 py-4 text-slate-700">Water</td>
                                <td class="px-6 py-4">
                                    <span class="font-bold text-slate-800">10,000</span> <span class="text-gray-500">Liters</span>
                                </td>
                                <td class="px-6 py-4">
                                    <span class="px-3.5 py-1.5 bg-emerald-100/80 text-emerald-700 rounded-full text-[11px] font-bold tracking-wide">Available</span>
                                </td>
                            </tr>

                            <tr class="hover:bg-gray-50/80 transition-colors">
                                <td class="px-6 py-4 flex items-center">
                                    <div class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center mr-4 shrink-0 text-gray-500 border border-gray-200/50">
                                        <i class="fa-solid fa-cube text-sm"></i>
                                    </div>
                                    <span class="font-bold text-slate-800">First Aid Kits</span>
                                </td>
                                <td class="px-6 py-4 text-slate-700">Medicine</td>
                                <td class="px-6 py-4">
                                    <span class="font-bold text-slate-800">50</span> <span class="text-gray-500">Kits</span>
                                </td>
                                <td class="px-6 py-4">
                                    <span class="px-3.5 py-1.5 bg-amber-100 text-amber-700 rounded-full text-[11px] font-bold tracking-wide">Low</span>
                                </td>
                            </tr>

                        </tbody>
                    </table>
                </div>
            </div>
            
        </div>
    </main>
</body>
</html>
