<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Audit Session - DisasterRelief</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="navigation.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        sidebar: '#1a365d',
                        sidebarHover: '#2a4a75',
                        brandBlue: '#1a4b6e',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
        }
        
        /* Custom Scrollbar for Sidebar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 12px;
            background-color: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
            border: 3px solid #f1f5f9;
        }

        /* Sidebar active state indicator */
        .sidebar-active {
            background-color: rgba(255,255,255,0.05);
            border: 1px solid white;
        }
        .sidebar-active i, .sidebar-active span {
            color: white !important;
            font-weight: 600;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <!-- Navigation will be injected here dynamically -->
    <script src="navigation.js"></script>

    <main class="flex-1 flex flex-col h-full overflow-hidden bg-gray-50/50">
        
        <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-8 shrink-0">
            <h1 class="text-xl font-bold text-slate-800">Compliance & Audits</h1>
            
            <div class="flex items-center space-x-6">
                <button class="relative text-gray-500 hover:text-gray-700">
                    <i class="fa-regular fa-bell text-xl"></i>
                    <span class="absolute top-0 right-0 block h-2 w-2 rounded-full bg-red-500 ring-2 ring-white"></span>
                </button>
                
                <div class="h-6 w-px bg-gray-300"></div>
                
                <span class="px-3 py-1 bg-white border border-blue-200 text-blue-600 rounded-md text-sm font-medium shadow-sm">
                    Compliance
                </span>
                
                <button class="flex items-center text-gray-600 hover:text-gray-800 text-sm font-medium">
                    <i class="fa-solid fa-arrow-right-from-bracket mr-2"></i>
                    Sign out
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="max-w-4xl mx-auto pt-4">
                
                <div class="mb-6">
                    <h2 class="text-2xl font-bold text-slate-800">Edit Audit Session</h2>
                </div>

                <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden flex flex-col">
                    
                    <div class="p-8 space-y-6">
                        
                        <div>
                            <label class="block text-sm font-bold text-slate-800 mb-2">Audit Scope</label>
                            <input type="text" 
                                   value="Q3 Relief Distribution Logs" 
                                   readonly
                                   class="w-full bg-gray-50/80 border border-transparent rounded-lg px-4 py-3 text-sm text-slate-700 focus:outline-none cursor-default">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-bold text-slate-800 mb-2">Date</label>
                                <div class="relative">
                                    <input type="text" 
                                           value="20-10-2023" 
                                           class="w-full bg-gray-50/80 border border-transparent rounded-lg pl-4 pr-10 py-3 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-colors">
                                    <i class="fa-regular fa-calendar absolute right-4 top-3.5 text-gray-500 text-sm pointer-events-none"></i>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-slate-800 mb-2">Status</label>
                                <div class="relative">
                                    <select class="w-full bg-gray-50/80 border border-transparent rounded-lg pl-4 pr-10 py-3 text-sm text-slate-700 appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-colors cursor-pointer">
                                        <option>Scheduled</option>
                                        <option>In Progress</option>
                                        <option selected>Completed</option>
                                    </select>
                                    <i class="fa-solid fa-chevron-down absolute right-4 top-4 text-slate-800 text-xs pointer-events-none"></i>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-slate-800 mb-2">Findings</label>
                            <textarea rows="5" 
                                      class="w-full bg-gray-50/80 border border-transparent rounded-lg p-4 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-colors resize-y"
                            >Minor discrepancies in water distribution counts.</textarea>
                        </div>
                        
                    </div>

                    <div class="px-8 py-5 border-t border-gray-100 bg-gray-50/30 flex justify-end space-x-4">
                        <button type="button" class="px-6 py-2.5 border border-gray-300 text-slate-700 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors bg-white shadow-sm">
                            Cancel
                        </button>
                        <button type="submit" class="px-6 py-2.5 bg-brandBlue text-white rounded-lg text-sm font-bold hover:bg-blue-900 transition-colors shadow-sm">
                            Save Changes
                        </button>
                    </div>

                </div>
                
            </div>
        </div>
    </main>
</body>
</html>
