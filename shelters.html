<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelters - DisasterRelief</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="navigation.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        sidebar: '#1a365d',
                        sidebarHover: '#2a4a75',
                        brandBlue: '#1a4b6e',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
        }
        
        /* Custom Scrollbar for Sidebar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            background-color: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        /* Sidebar active state indicator (matching screenshot) */
        .sidebar-active {
            background-color: rgba(255,255,255,0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .sidebar-active i, .sidebar-active span {
            color: white !important;
            font-weight: 600;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <!-- Navigation will be injected here dynamically -->
    <script src="navigation.js"></script>

    <main class="flex-1 flex flex-col h-full overflow-hidden bg-white">
        
        <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-8 shrink-0">
            <h1 class="text-xl font-bold text-slate-800">Relief Operations</h1>
            
            <div class="flex items-center space-x-6">
                <button class="relative text-gray-500 hover:text-gray-700">
                    <i class="fa-regular fa-bell text-xl"></i>
                    <span class="absolute top-0 right-0 block h-2 w-2 rounded-full bg-red-500 ring-2 ring-white"></span>
                </button>
                
                <div class="h-6 w-px bg-gray-300"></div>
                
                <span class="px-3 py-1 bg-white border border-blue-200 text-blue-600 rounded-md text-sm font-medium shadow-sm">
                    Compliance
                </span>
                
                <button class="flex items-center text-gray-600 hover:text-gray-800 text-sm font-medium">
                    <i class="fa-solid fa-arrow-right-from-bracket mr-2"></i>
                    Sign out
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 bg-gray-50/50">
            
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-slate-800 mb-1">Shelters</h2>
                <p class="text-gray-500 text-sm">Manage emergency shelters and their occupancy.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6 max-w-5xl">
                
                <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 flex flex-col">
                    <div class="flex items-center justify-between mb-5">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-lg bg-gray-50 border border-gray-200 flex items-center justify-center text-brandBlue mr-3 shrink-0">
                                <i class="fa-regular fa-building text-lg"></i>
                            </div>
                            <h3 class="text-lg font-bold text-slate-800 leading-tight">Central High School Gym</h3>
                        </div>
                        <span class="px-2.5 py-1 bg-emerald-100/80 text-emerald-800 rounded-full text-xs font-bold tracking-wide shrink-0 ml-3">
                            Open
                        </span>
                    </div>

                    <div class="bg-gray-50 border border-gray-100 rounded-lg py-2.5 px-4 mb-6 text-sm text-slate-700 font-medium">
                        100 Education Way
                    </div>

                    <div class="flex justify-between items-center mb-2">
                        <div class="text-sm text-gray-500 flex items-center font-medium">
                            <i class="fa-solid fa-user-group text-gray-400 mr-2 text-xs"></i> Occupancy
                        </div>
                        <div class="text-sm text-slate-800">
                            <span class="font-bold">350</span> <span class="font-bold">/ 500</span>
                        </div>
                    </div>

                    <div class="w-full bg-gray-200 rounded-full h-2 mb-1.5">
                        <div class="bg-[#8b9e7d] h-2 rounded-full" style="width: 70%"></div>
                    </div>
                    
                    <div class="text-right text-xs text-gray-500 font-bold mb-6">
                        70% Full
                    </div>

                    <div class="mt-auto text-right border-t border-gray-100 pt-4">
                        <a href="#" class="text-brandBlue font-bold text-sm hover:text-blue-900 transition-colors inline-flex items-center">
                            View Details <span class="ml-1 text-lg leading-none">&rarr;</span>
                        </a>
                    </div>
                </div>

                <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 flex flex-col">
                    <div class="flex items-center justify-between mb-5">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-lg bg-gray-50 border border-gray-200 flex items-center justify-center text-brandBlue mr-3 shrink-0">
                                <i class="fa-regular fa-building text-lg"></i>
                            </div>
                            <h3 class="text-lg font-bold text-slate-800 leading-tight">Community Center</h3>
                        </div>
                        <span class="px-2.5 py-1 bg-red-100/80 text-red-700 rounded-full text-xs font-bold tracking-wide shrink-0 ml-3">
                            Full
                        </span>
                    </div>

                    <div class="bg-gray-50 border border-gray-100 rounded-lg py-2.5 px-4 mb-6 text-sm text-slate-700 font-medium">
                        250 Civic Plaza
                    </div>

                    <div class="flex justify-between items-center mb-2">
                        <div class="text-sm text-gray-500 flex items-center font-medium">
                            <i class="fa-solid fa-user-group text-gray-400 mr-2 text-xs"></i> Occupancy
                        </div>
                        <div class="text-sm text-slate-800">
                            <span class="font-bold">200</span> <span class="font-bold">/ 200</span>
                        </div>
                    </div>

                    <div class="w-full bg-gray-200 rounded-full h-2 mb-1.5">
                        <div class="bg-[#d92d20] h-2 rounded-full" style="width: 100%"></div>
                    </div>
                    
                    <div class="text-right text-xs text-gray-500 font-bold mb-6">
                        100% Full
                    </div>

                    <div class="mt-auto text-right border-t border-gray-100 pt-4">
                        <a href="#" class="text-brandBlue font-bold text-sm hover:text-blue-900 transition-colors inline-flex items-center">
                            View Details <span class="ml-1 text-lg leading-none">&rarr;</span>
                        </a>
                    </div>
                </div>

            </div>
            
        </div>
    </main>
</body>
</html>
