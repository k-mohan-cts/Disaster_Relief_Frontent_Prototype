</style></head>
<body>
  <div class="app-shell">
    <aside class="sidebar"><div class="brand"><img src="./logo.png" alt="Logo" style="max-height:40px; margin-right:10px; vertical-align:middle;"> <span>DisasterRelief</span></div><nav class="side-nav"><div class="nav-group"><p class="nav-group-title operations">OPERATIONS</p><a class="nav-link active operations" href="./shelters.html"><span>▣</span>Shelters</a></div></nav><div class="profile"><div class="avatar" id="profileAvatar">U</div><div><p id="profileName"></p><small id="profileRole"></small></div></div></aside>
    <section class="content"><header class="topbar"><h1>Relief Operations</h1><div class="topbar-right"><span class="role-chip" id="roleChip"></span><button id="logoutBtn" class="text-btn">Sign out</button></div></header>
      <main class="main"><div class="page form-wrap"><h2 id="shelterFormTitle">Add Shelter</h2><section class="panel"><form id="shelterForm"><div class="form-grid"><div><label>Shelter Name</label><input name="Name" required/></div><div><label>Status</label><select name="Status"><option>Open</option><option>Full</option><option>Closed</option><option>UnderMaintenance</option></select></div><div class="full"><label>Location</label><input name="Location" required/></div><div><label>Total Capacity</label><input type="number" name="Capacity" min="0" required/></div><div><label>Occupancy</label><input type="number" name="Occupancy" min="0" required/></div></div><div class="form-actions"><a class="btn btn-secondary" href="./shelters.html">Cancel</a><button id="shelterSubmitBtn" class="btn btn-operations" type="submit">Add Shelter</button></div></form></section></div></main>
    </section>
  </div>
  <script>
const STORAGE_KEY = "drms_state_v1";
const seed = {
  currentUser: null,
  users: [
    { UserID: 2, Name: "Sarah Officer", Role: "Officer", Email: "officer@test.com" },
    { UserID: 3, Name: "Michael Manager", Role: "Manager", Email: "manager@test.com" }
  ],
  programs: [
    { ProgramID: 1, Title: "Coastal Flood Rehabilitation", StartDate: "2023-09-01", EndDate: "2024-09-01", Budget: 5000000, Status: "Active", Description: "Rebuilding homes and infrastructure damaged by the recent coastal floods." },
    { ProgramID: 2, Title: "Downtown Earthquake Recovery", StartDate: "2023-11-15", EndDate: "2025-11-15", Budget: 12000000, Status: "Planned", Description: "Structural assessment and repair of downtown commercial buildings." }
  ],
  shelters: [
    { ShelterID: 1, Name: "Central High School Gym", Location: "100 Education Way", Capacity: 500, Occupancy: 350, Status: "Open" },
    { ShelterID: 2, Name: "Community Center", Location: "250 Civic Plaza", Capacity: 200, Occupancy: 200, Status: "Full" }
  ],
  reliefItems: [
    { ItemID: 1, ProgramID: 1, Type: "Food", Name: "MRE Rations", Quantity: 5000, UnitCost: 10, Unit: "Meals", Status: "Available" },
    { ItemID: 2, ProgramID: 1, Type: "Water", Name: "Bottled Water", Quantity: 10000, UnitCost: 2, Unit: "Liters", Status: "Available" }
  ],
  distributions: [
    { DistributionID: 1, ItemID: 1, Incident: "Flood at Riverside District", Program: "Coastal Flood Rehabilitation", Quantity: 10, Status: "Distributed" }
  ],
  citizens: [
    { CitizenID: 1, Name: "John Citizen", Address: "123 Riverside Dr", ContactInfo: "555-0101", Status: "Verified" },
    { CitizenID: 2, Name: "Jane Doe", Address: "456 Pine Hills Rd", ContactInfo: "555-0202", Status: "Pending" }
  ],
  reports: [
    { ReportID: 1, Type: "Flood", Location: "Riverside District", Date: "2023-10-01T14:30:00Z", Description: "Water level rising rapidly near Main St.", Status: "Validated" },
    { ReportID: 2, Type: "Fire", Location: "Pine Hills", Date: "2023-10-15T09:15:00Z", Description: "Brush fire spreading towards residential area.", Status: "Resolved" }
  ]
};

function cloneSeed() {
  return JSON.parse(JSON.stringify(seed));
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(seed));
      return cloneSeed();
    }
    return JSON.parse(raw);
  } catch {
    return cloneSeed();
  }
}
const state = loadState();
const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
const money = (v) => `$${Number(v).toLocaleString("en-IN")}`;
const nextId = (items, key) => (items.length ? Math.max(...items.map((i) => Number(i[key]) || 0)) + 1 : 1);
const tbody = (id, html) => { const el = document.getElementById(id); if (el) el.innerHTML = html; };
const qid = () => Number(new URLSearchParams(location.search).get("id") || 0);
const currentPage = () => location.pathname.split("/").pop() || "index.html";
const statusToneMap = {
  Active: "emerald",
  Open: "emerald",
  Available: "emerald",
  Verified: "emerald",
  Distributed: "emerald",
  Validated: "emerald",
  Planned: "sky",
  Reserved: "sky",
  Resolved: "violet",
  Completed: "violet",
  Pending: "amber",
  Suspended: "amber",
  Maint: "amber",
  Low: "amber",
  Full: "rose",
  OutOfStock: "rose",
  Closed: "slate",
  Inactive: "slate"
};
const toneForStatus = (label) => statusToneMap[label] || "slate";
const statusPill = (label) => `<span class="pill ${toneForStatus(label)}">${label}</span>`;
const normalizeCitizenStatus = (status) => {
  if (status === "Pending") return "Unverified";
  return status || "Unverified";
};

function navIsActive(page, href) {
  const parentMap = {
    "add-relief-item.html": "relief-inventory.html",
    "create-distribution.html": "distributions.html",
    "add-shelter.html": "shelters.html",
    "shelter-detail.html": "shelters.html",
    "register-citizen.html": "citizens.html",
    "emergency-detail.html": "emergencies.html",
    "recovery-program-detail.html": "recovery-programs.html"
  };
  const normalized = parentMap[page] || page;
  return normalized === href;
}

function ensureShellLayout() {
  const loginForm = document.getElementById("loginForm");
  if (loginForm) return;

  const sidebar = document.querySelector(".sidebar");
  if (sidebar) {
    const page = currentPage();
    const links = [
      { href: "dashboard.html", label: "Dashboard", icon: "⌂", group: "operations" },
      { href: "relief-inventory.html", label: "Relief Inventory", icon: "◈", group: "operations" },
      { href: "distributions.html", label: "Distributions", icon: "⌁", group: "operations" },
      { href: "shelters.html", label: "Shelters", icon: "▣", group: "operations" },
      { href: "citizens.html", label: "Citizen Registry", icon: "⚭", group: "operations" },
      { href: "emergencies.html", label: "Emergencies", icon: "△", group: "emergencies" },
      { href: "recovery-programs.html", label: "Recovery Programs", icon: "▤", group: "recovery" }
    ];
    const byGroup = (name) => links.filter((l) => l.group === name).map((l) => {
      const active = navIsActive(page, l.href) ? ` active ${l.group}` : "";
      return `<a class="nav-link${active}" href="./${l.href}"><span>${l.icon}</span>${l.label}</a>`;
    }).join("");
    sidebar.innerHTML = `
      <div class="brand"><img src="./logo.png" alt="Logo" style="max-height:40px; margin-right:10px; vertical-align:middle;"> <span>DisasterRelief</span></div>
      <nav class="side-nav">
        <div class="nav-group">
          <p class="nav-group-title operations">OPERATIONS</p>
          ${byGroup("operations")}
        </div>
        <div class="nav-group">
          <p class="nav-group-title emergencies">EMERGENCIES</p>
          ${byGroup("emergencies")}
        </div>
        <div class="nav-group">
          <p class="nav-group-title recovery">RECOVERY</p>
          ${byGroup("recovery")}
        </div>
      </nav>
      <div class="profile">
        <div class="avatar" id="profileAvatar">U</div>
        <div><p id="profileName"></p><small id="profileRole"></small></div>
      </div>
    `;
  }

  const topbarRight = document.querySelector(".topbar-right");
  if (topbarRight && !topbarRight.querySelector(".bell")) {
    topbarRight.insertAdjacentHTML("afterbegin", '<span class="bell">🔔</span>');
  }
}

function authGuard() {
  const page = location.pathname.split("/").pop();
  if (page !== "index.html" && !state.currentUser) location.href = "./index.html";
}
function bindShell() {
  const set = (id, text) => { const el = document.getElementById(id); if (el) el.textContent = text; };
  set("roleChip", state.currentUser?.Role || "");
  set("profileName", state.currentUser?.Name || "");
  set("profileRole", state.currentUser?.Role || "");
  set("profileAvatar", (state.currentUser?.Name || "U").charAt(0));
  const logout = document.getElementById("logoutBtn");
  if (logout) logout.onclick = () => { state.currentUser = null; save(); location.href = "./index.html"; };
}
function bindLogin() {
  const form = document.getElementById("loginForm");
  if (!form) return;
  form.onsubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const role = String(fd.get("role") || "Officer");
    const email = String(fd.get("email") || "");
    const user = state.users.find((u) => u.Role === role) || state.users[0];
    state.currentUser = { ...user, Email: email || user.Email };
    save();
    location.href = "./dashboard.html";
  };
}

function fillDashboard() {
  const emergencyCounts = {
    Active: state.reports.filter((r) => r.Status === "Validated").length,
    Pending: state.reports.filter((r) => r.Status === "Pending").length,
    Resolved: state.reports.filter((r) => r.Status === "Resolved").length,
    Closed: state.reports.filter((r) => r.Status === "Closed").length
  };
  const shelterCounts = {
    Open: state.shelters.filter((s) => s.Status === "Open").length,
    Full: state.shelters.filter((s) => s.Status === "Full").length,
    Closed: state.shelters.filter((s) => s.Status === "Closed").length,
    Maint: state.shelters.filter((s) => s.Status === "UnderMaintenance").length
  };
  const programCounts = {
    Active: state.programs.filter((p) => p.Status === "Active").length,
    Planned: state.programs.filter((p) => p.Status === "Planned").length,
    Completed: state.programs.filter((p) => p.Status === "Completed").length,
    Suspended: state.programs.filter((p) => p.Status === "Suspended").length
  };
  const inventoryCounts = {
    Available: state.reliefItems.filter((i) => i.Status === "Available").length,
    Low: state.reliefItems.filter((i) => i.Status === "Low").length,
    OutOfStock: state.reliefItems.filter((i) => i.Status === "OutOfStock").length,
    Reserved: state.reliefItems.filter((i) => i.Status === "Reserved").length
  };
  const citizenCounts = {
    Verified: state.citizens.filter((c) => c.Status === "Verified").length,
    Pending: state.citizens.filter((c) => c.Status === "Pending").length,
    Active: state.citizens.filter((c) => c.Status === "Active").length,
    Inactive: state.citizens.filter((c) => c.Status === "Inactive").length
  };

  const renderStatusList = (targetId, stats) => {
    const target = document.getElementById(targetId);
    if (!target) return;
    const total = Math.max(1, Object.values(stats).reduce((sum, value) => sum + value, 0));
    target.innerHTML = Object.entries(stats).map(([label, count]) => {
      const tone = toneForStatus(label);
      const percent = Math.round((count / total) * 100);
      return `<div class="status-item"><div class="status-row"><span><i class="dot ${tone}"></i>${label}</span><b>${count}</b></div><div class="status-meter"><span class="${tone}" style="width:${percent}%"></span></div></div>`;
    }).join("");
  };

  renderStatusList("status-emergencies", emergencyCounts);
  renderStatusList("status-shelters", shelterCounts);
  renderStatusList("status-programs", programCounts);
  renderStatusList("status-inventory", inventoryCounts);
  renderStatusList("status-citizens", citizenCounts);

  const emergencyFeed = document.getElementById("recentEmergencies");
  if (emergencyFeed) {
    emergencyFeed.innerHTML = state.reports.slice(0, 4).map((r) => `<article class="list-item"><p><strong>${r.Type} - ${r.Location}</strong></p><small>${new Date(r.Date).toLocaleDateString()}</small>${statusPill(r.Status === "Validated" ? "Validated" : r.Status)}</article>`).join("");
  }
  const programFeed = document.getElementById("activePrograms");
  if (programFeed) {
    programFeed.innerHTML = state.programs.slice(0, 4).map((p) => `<article class="list-item"><p><strong>${p.Title}</strong></p><small>Budget: ${money(p.Budget)}</small>${statusPill(p.Status)}</article>`).join("");
  }
}
function fillPrograms() {
  tbody("programRows", state.programs.map((p) => `<tr><td><strong>${p.Title}</strong></td><td>${new Date(p.StartDate).toLocaleDateString()} - ${new Date(p.EndDate).toLocaleDateString()}</td><td>${money(p.Budget)}</td><td>${statusPill(p.Status)}</td><td><a href="./recovery-program-detail.html?id=${p.ProgramID}">View</a></td></tr>`).join(""));
}
function fillInventory() {
  tbody("inventoryRows", state.reliefItems.map((i) => {
    const p = state.programs.find((x) => x.ProgramID === i.ProgramID);
    return `<tr><td><strong>${i.Name}</strong></td><td>${p?.Title || "-"}</td><td>${i.Type}</td><td>${i.Quantity} ${i.Unit}</td><td>${money(i.UnitCost)}</td><td>${money(i.Quantity * i.UnitCost)}</td><td>${statusPill(i.Status)}</td><td><a href="./add-relief-item.html?id=${i.ItemID}">Edit</a> <a href="#" data-del-item="${i.ItemID}">Delete</a></td></tr>`;
  }).join(""));
  document.querySelectorAll("[data-del-item]").forEach((a) => {
    a.onclick = (e) => {
      e.preventDefault();
      const id = Number(a.getAttribute("data-del-item"));
      state.reliefItems = state.reliefItems.filter((i) => i.ItemID !== id);
      save();
      fillInventory();
    };
  });
}
function bindItemForm() {
  const form = document.getElementById("itemForm");
  if (!form) return;
  const id = qid();
  const item = state.reliefItems.find((i) => i.ItemID === id);
  form.ProgramID.innerHTML = state.programs.map((p) => `<option value="${p.ProgramID}">${p.Title}</option>`).join("");
  if (item) {
    form.Name.value = item.Name; form.Type.value = item.Type; form.ProgramID.value = String(item.ProgramID);
    form.Quantity.value = String(item.Quantity); form.UnitCost.value = String(item.UnitCost); form.Unit.value = item.Unit; form.Status.value = item.Status;
  }
  const calc = () => {
    const qty = Number(form.Quantity.value || 0);
    const unit = Number(form.UnitCost.value || 0);
    const pid = Number(form.ProgramID.value || 0);
    const p = state.programs.find((x) => x.ProgramID === pid);
    const used = state.reliefItems.filter((i) => i.ProgramID === pid && i.ItemID !== id).reduce((t, i) => t + i.Quantity * i.UnitCost, 0);
    const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
    set("itemTotalCost", money(qty * unit)); set("programBudget", money(p?.Budget || 0)); set("programAllocated", money(used)); set("programRemaining", money(Math.max(0, (p?.Budget || 0) - used)));
  };
  form.ProgramID.onchange = calc; form.Quantity.oninput = calc; form.UnitCost.oninput = calc; calc();
  form.onsubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const payload = { Name: String(fd.get("Name")), Type: String(fd.get("Type")), ProgramID: Number(fd.get("ProgramID")), Quantity: Number(fd.get("Quantity")), UnitCost: Number(fd.get("UnitCost")), Unit: String(fd.get("Unit")), Status: String(fd.get("Status")) };
    if (id) state.reliefItems = state.reliefItems.map((i) => i.ItemID === id ? { ...i, ...payload } : i);
    else state.reliefItems.push({ ...payload, ItemID: nextId(state.reliefItems, "ItemID") });
    save(); location.href = "./relief-inventory.html";
  };
}
function fillDistributions() {
  tbody("distributionRows", state.distributions.map((d) => {
    const item = state.reliefItems.find((i) => i.ItemID === d.ItemID);
    return `<tr><td><strong>${item?.Name || "-"}</strong><small>Qty: ${d.Quantity} ${item?.Unit || ""}</small></td><td>${d.Incident}</td><td>${d.Program}</td><td>${statusPill(d.Status)}</td></tr>`;
  }).join(""));
}
function bindDistributionForm() {
  const form = document.getElementById("distributionForm");
  if (!form) return;
  form.ItemID.innerHTML = state.reliefItems.map((i) => `<option value="${i.ItemID}">${i.Name} (${i.Quantity} ${i.Unit})</option>`).join("");
  form.Incident.innerHTML = state.reports.map((r) => `<option value="${r.Type} at ${r.Location}">${r.Type} at ${r.Location}</option>`).join("");
  form.Program.innerHTML = state.programs.map((p) => `<option value="${p.Title}">${p.Title}</option>`).join("");
  form.onsubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    state.distributions.push({ DistributionID: nextId(state.distributions, "DistributionID"), ItemID: Number(fd.get("ItemID")), Incident: String(fd.get("Incident")), Program: String(fd.get("Program")), Quantity: Number(fd.get("Quantity")), Status: "Distributed" });
    save(); location.href = "./distributions.html";
  };
}
function fillShelters() {
  const el = document.getElementById("shelterCards");
  if (!el) return;
  el.innerHTML = state.shelters.map((s) => {
    const ratio = s.Capacity > 0 ? (s.Occupancy / s.Capacity) * 100 : 0;
    const pct = Math.max(0, Math.min(100, ratio));
    const tone = s.Status === "Full" || pct >= 90 ? "danger" : pct >= 75 ? "warn" : "";
    return `<article class="card">
      <div class="card-body">
        <div class="shelter-head">
          <h3>▣ ${s.Name}</h3>
          ${statusPill(s.Status)}
        </div>
        <p>${s.Location}</p>
        <div class="occ-row"><span>Occupancy</span><strong>${s.Occupancy} / ${s.Capacity}</strong></div>
        <div class="progress ${tone}"><span style="width:${pct}%"></span></div>
      </div>
      <div class="card-actions">
        <a class="card-link" href="./shelter-detail.html?id=${s.ShelterID}">View Details →</a>
        <a class="card-link card-link-edit" href="./add-shelter.html?id=${s.ShelterID}">Edit</a>
        <a class="card-link card-link-danger" href="#" data-del-shelter="${s.ShelterID}">Delete</a>
      </div>
    </article>`;
  }).join("");
  document.querySelectorAll("[data-del-shelter]").forEach((a) => {
    a.onclick = (e) => {
      e.preventDefault();
      const id = Number(a.getAttribute("data-del-shelter"));
      const shelter = state.shelters.find((x) => x.ShelterID === id);
      if (!shelter) return;
      const ok = window.confirm(`Delete shelter "${shelter.Name}"?`);
      if (!ok) return;
      state.shelters = state.shelters.filter((x) => x.ShelterID !== id);
      save();
      fillShelters();
    };
  });
}
function bindShelterForm() {
  const form = document.getElementById("shelterForm");
  if (!form) return;
  const id = qid();
  const s = state.shelters.find((x) => x.ShelterID === id);
  if (s) {
    form.Name.value = s.Name;
    form.Location.value = s.Location;
    form.Capacity.value = String(s.Capacity);
    form.Occupancy.value = String(s.Occupancy);
    form.Status.value = s.Status;
    const title = document.getElementById("shelterFormTitle");
    const submit = document.getElementById("shelterSubmitBtn");
    if (title) title.textContent = "Edit Shelter";
    if (submit) submit.textContent = "Update Shelter";
  }
  form.onsubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const payload = { Name: String(fd.get("Name")), Location: String(fd.get("Location")), Capacity: Number(fd.get("Capacity")), Occupancy: Number(fd.get("Occupancy")), Status: String(fd.get("Status")) };
    if (id) state.shelters = state.shelters.map((x) => x.ShelterID === id ? { ...x, ...payload } : x);
    else state.shelters.push({ ...payload, ShelterID: nextId(state.shelters, "ShelterID") });
    save(); location.href = "./shelters.html";
  };
}
function fillCitizens() {
  tbody("citizenRows", state.citizens.map((c) => {
    const status = normalizeCitizenStatus(c.Status);
    return `<tr><td><strong>${c.Name}</strong></td><td>${c.ContactInfo}</td><td>${c.Address}</td><td>${statusPill(status)}</td><td class="actions"><a href="./register-citizen.html?id=${c.CitizenID}">Edit</a></td></tr>`;
  }).join(""));
}
function bindCitizenForm() {
  const form = document.getElementById("citizenForm");
  if (!form) return;
  const id = qid();
  const citizen = state.citizens.find((c) => c.CitizenID === id);
  if (citizen) {
    form.Name.value = citizen.Name;
    form.ContactInfo.value = citizen.ContactInfo;
    form.Address.value = citizen.Address;
    form.Status.value = normalizeCitizenStatus(citizen.Status);
    const title = document.getElementById("citizenFormTitle");
    const submit = document.getElementById("citizenSubmitBtn");
    if (title) title.textContent = "Edit Citizen";
    if (submit) submit.textContent = "Update Citizen";
  } else {
    form.Status.value = "Unverified";
  }
  form.onsubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const payload = {
      Name: String(fd.get("Name")),
      ContactInfo: String(fd.get("ContactInfo")),
      Address: String(fd.get("Address")),
      Status: normalizeCitizenStatus(String(fd.get("Status") || "Unverified"))
    };
    if (id) {
      state.citizens = state.citizens.map((c) => c.CitizenID === id ? { ...c, ...payload } : c);
    } else {
      state.citizens.push({ CitizenID: nextId(state.citizens, "CitizenID"), ...payload });
    }
    save(); location.href = "./citizens.html";
  };
}
function fillEmergencies() {
  tbody("emergencyRows", state.reports.map((r) => `<tr><td><strong>${r.Type}</strong></td><td>${r.Location}</td><td>${new Date(r.Date).toLocaleDateString()}</td><td>${statusPill(r.Status === "Validated" ? "Validated" : r.Status)}</td><td><a href="./emergency-detail.html?id=${r.ReportID}">View</a></td></tr>`).join(""));
}
function fillDetails() {
  const id = qid();
  const p = state.programs.find((x) => x.ProgramID === id);
  if (p && document.getElementById("programTitle")) {
    document.getElementById("programTitle").textContent = p.Title;
    document.getElementById("programStatus").textContent = p.Status;
    document.getElementById("programBudget").textContent = money(p.Budget);
    document.getElementById("programTimeline").textContent = `${new Date(p.StartDate).toLocaleDateString()} - ${new Date(p.EndDate).toLocaleDateString()}`;
    document.getElementById("programDescription").textContent = p.Description;
    tbody("resourceRows", state.reliefItems.filter((i) => i.ProgramID === p.ProgramID).map((i) => `<tr><td><strong>${i.Name}</strong></td><td>${i.Type}</td><td>${i.Quantity} ${i.Unit}</td><td>${i.Status}</td><td>-</td></tr>`).join(""));
  }
  const s = state.shelters.find((x) => x.ShelterID === id);
  if (s && document.getElementById("shelterTitle")) {
    document.getElementById("shelterTitle").textContent = s.Name;
    document.getElementById("shelterLocation").textContent = s.Location;
    document.getElementById("shelterStatus").textContent = s.Status;
    document.getElementById("shelterCapacity").textContent = String(s.Capacity);
    document.getElementById("shelterOccupancy").textContent = String(s.Occupancy);
    const editBtn = document.getElementById("shelterEditBtn");
    if (editBtn) editBtn.setAttribute("href", `./add-shelter.html?id=${s.ShelterID}`);
    const deleteBtn = document.getElementById("shelterDeleteBtn");
    if (deleteBtn) {
      deleteBtn.onclick = () => {
        const ok = window.confirm(`Delete shelter "${s.Name}"?`);
        if (!ok) return;
        state.shelters = state.shelters.filter((x) => x.ShelterID !== s.ShelterID);
        save();
        location.href = "./shelters.html";
      };
    }
  }
  const r = state.reports.find((x) => x.ReportID === id);
  if (r && document.getElementById("reportTitle")) {
    document.getElementById("reportTitle").textContent = `${r.Type} Emergency — ${r.Location}`;
    document.getElementById("reportType").textContent = `${r.Type} Emergency`;
    document.getElementById("reportLocation").textContent = r.Location;
    document.getElementById("reportDate").textContent = new Date(r.Date).toLocaleString();
    document.getElementById("reportStatus").textContent = r.Status;
    document.getElementById("reportDescription").textContent = r.Description;
  }
}
function bindSearches() {
  const search = document.querySelector(".search");
  if (!search) return;
  search.addEventListener("input", () => {
    const query = String(search.value || "").trim().toLowerCase();
    if (document.getElementById("inventoryRows")) {
      document.querySelectorAll("#inventoryRows tr").forEach((row) => {
        row.style.display = row.textContent.toLowerCase().includes(query) ? "" : "none";
      });
    }
    if (document.getElementById("distributionRows")) {
      document.querySelectorAll("#distributionRows tr").forEach((row) => {
        row.style.display = row.textContent.toLowerCase().includes(query) ? "" : "none";
      });
    }
    if (document.getElementById("citizenRows")) {
      document.querySelectorAll("#citizenRows tr").forEach((row) => {
        row.style.display = row.textContent.toLowerCase().includes(query) ? "" : "none";
      });
    }
    if (document.getElementById("emergencyRows")) {
      document.querySelectorAll("#emergencyRows tr").forEach((row) => {
        row.style.display = row.textContent.toLowerCase().includes(query) ? "" : "none";
      });
    }
    if (document.getElementById("programRows")) {
      document.querySelectorAll("#programRows tr").forEach((row) => {
        row.style.display = row.textContent.toLowerCase().includes(query) ? "" : "none";
      });
    }
    if (document.getElementById("shelterCards")) {
      document.querySelectorAll("#shelterCards .card").forEach((card) => {
        card.style.display = card.textContent.toLowerCase().includes(query) ? "" : "none";
      });
    }
  });
}
function init() {
  ensureShellLayout();
  bindLogin();
  if (!document.getElementById("loginForm")) { authGuard(); bindShell(); }
  fillDashboard(); fillPrograms(); fillInventory(); bindItemForm();
  fillDistributions(); bindDistributionForm();
  fillShelters(); bindShelterForm();
  fillCitizens(); bindCitizenForm();
  fillEmergencies(); fillDetails();
  bindSearches();
}
init();

</script>
